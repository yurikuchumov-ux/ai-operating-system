name: Claude Review - AI OS Inheritance

on:
  pull_request:
    types: [synchronize]

permissions:
  contents: read
  issues: write
  pull-requests: write
  id-token: write

jobs:
  review:
    if: github.event.pull_request.number == 11
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Independent architecture review
        id: claude
        uses: anthropics/claude-code-action@e90deca47693f9457b72f2b53c17d7c445a87342 # v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Independently review PR #11 against Issue #10. Read only PR metadata and diff.
            Check precedence, tracking/pinned modes, compatibility policy, security constraints,
            contradictions with AI_OS.md, and sufficiency for downstream automation.
            Do not edit files, comment, review, or merge. Return only the requested JSON.
          json_schema: '{"type":"object","properties":{"verdict":{"type":"string","enum":["APPROVE","REQUEST_CHANGES"]},"summary":{"type":"string"}},"required":["verdict","summary"]}'
          claude_args: |
            --max-turns 3
            --allowedTools "Bash(gh pr view:*),Bash(gh pr diff:*)"
            --disallowedTools "Edit,Write,NotebookEditCell"

      - name: Publish review result
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          STRUCTURED_OUTPUT: ${{ steps.claude.outputs.structured_output }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          verdict=$(printf '%s' "$STRUCTURED_OUTPUT" | jq -er '.verdict')
          summary=$(printf '%s' "$STRUCTURED_OUTPUT" | jq -er '.summary')
          body=$(printf '**Claude independent review — %s**\n\n%s' "$verdict" "$summary")
          gh api --method POST "/repos/$REPO/issues/$PR/comments" -f body="$body"
