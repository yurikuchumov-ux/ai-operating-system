name: Claude Review Bootstrap

on:
  pull_request:
    types: [synchronize]

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  review:
    if: github.event.pull_request.number == 9
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out pull request
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Run independent Claude review
        id: claude
        uses: anthropics/claude-code-action@e90deca47693f9457b72f2b53c17d7c445a87342 # v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Perform an independent review of PR #${{ github.event.pull_request.number }}.
            Check compliance with Issue #8, verify that only AI_OS.md is in the intended final scope,
            confirm existing rules are not weakened, and assess the new Capability Discovery First
            and Automation First principles for clarity, completeness, and contradictions.
            Do not modify files, create commits, push, merge, or change repository settings.
            Return only the requested structured result.
          claude_args: |
            --max-turns 6
            --allowedTools "Bash(gh pr diff:*),Bash(gh pr view:*)"
            --disallowedTools "Edit,Write,NotebookEditCell"
            --json-schema '{"type":"object","properties":{"verdict":{"type":"string","enum":["APPROVE","REQUEST_CHANGES"]},"summary":{"type":"string"}},"required":["verdict","summary"]}'

      - name: Publish formal GitHub review
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          OUTPUT: ${{ steps.claude.outputs.structured_output }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          test -n "$OUTPUT"
          verdict=$(printf '%s' "$OUTPUT" | jq -er '.verdict')
          summary=$(printf '%s' "$OUTPUT" | jq -er '.summary')

          case "$verdict" in
            APPROVE) event=APPROVE ;;
            REQUEST_CHANGES) event=REQUEST_CHANGES ;;
            *) echo "Unexpected verdict: $verdict" >&2; exit 1 ;;
          esac

          jq -n --arg body "$summary" --arg event "$event" \
            '{body: $body, event: $event}' \
            | gh api --method POST \
                -H "Accept: application/vnd.github+json" \
                "/repos/$REPO/pulls/$PR/reviews" \
                --input -
